<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#ff6347">
    <title>스마트 더하기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>빈칸채우기</h1>
            <button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>
        </div>
        
        <!-- 모드 선택 버튼 -->
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('addition')">➕ 더하기</button>
            <button class="mode-btn" onclick="switchMode('pattern')">🗐 빈칸채우기</button>
        </div>
        
        <div class="score-board">
            <span class="score">✓ 맞힌수: <span id="correct-count">0</span></span>
            <span class="score">✗ 틀린수: <span id="wrong-count">0</span></span>
        </div>
        <p id="question">문제를 준비 중...</p>
        <div id="options"></div>
        <p id="feedback"></p>
    </div>
    
    <!-- 설정 모달 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>설정</h2>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            <div class="modal-body">
                <!-- 더하기 설정 -->
                <div id="additionSettings" class="settings-section">
                    <h3>더하기 난이도</h3>
                    <label>
                        <input type="radio" name="difficulty" value="easy" onchange="updateDifficulty('addition', 'easy')" checked> 쉬움 (1-5)
                    </label>
                    <label>
                        <input type="radio" name="difficulty" value="normal" onchange="updateDifficulty('addition', 'normal')"> 보통 (0-10)
                    </label>
                    <label>
                        <input type="radio" name="difficulty" value="hard" onchange="updateDifficulty('addition', 'hard')"> 어려움 (10-20)
                    </label>
                </div>
                
                <!-- 빈칸채우기 설정 -->
                <div id="patternSettings" class="settings-section" style="display:none;">
                    <h3>빈칸채우기 설정</h3>
                    <div class="setting-input-group">
                        <label>숫자 최소 값:</label>
                        <input type="number" id="minNum" min="1" max="99" value="1" onchange="validateInput()">
                    </div>
                    <div class="setting-input-group">
                        <label>숫자 최대 값:</label>
                        <input type="number" id="maxNum" min="1" max="99" value="50" onchange="validateInput()">
                    </div>
                    <div class="setting-input-group">
                        <label>빈칸 숫자 개수:</label>
                        <input type="number" id="blankCount" min="1" max="3" value="1" onchange="validateInput()">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeSettings()">done</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
